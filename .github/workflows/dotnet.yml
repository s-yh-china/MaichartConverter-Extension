name: Build and Release

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore ./MaichartConverter.csproj --runtime win-x64

      - name: Build
        run: dotnet build ./MaichartConverter.csproj --configuration Release --runtime win-x64 --no-restore

      - name: Test
        run: dotnet test ./MaichartConverter.csproj --configuration Release --no-build --verbosity normal

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Show .NET SDK info
        run: dotnet --info

      - name: Read project version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content "./MaichartConverter.csproj"
          $version = $project.Project.PropertyGroup.Version | Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Version was not found in MaichartConverter.csproj"
          }

          $tag = "v$version"

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

          Write-Host "Project version: $version"
          Write-Host "Release tag: $tag"

      - name: Check whether tag already exists
        id: tag_check
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} does not exist."
          fi

      - name: Restore dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: dotnet restore ./MaichartConverter.csproj --runtime win-x64

      - name: Publish win-x64
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          dotnet publish ./MaichartConverter.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            --no-restore \
            --output ./publish/win-x64

      - name: Pack release artifact
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          cd ./publish/win-x64
          zip -r ../../MaichartConverter-${{ steps.version.outputs.version }}-win-x64.zip .
          cd ../..

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MaichartConverter ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            MaichartConverter-${{ steps.version.outputs.version }}-win-x64.zip